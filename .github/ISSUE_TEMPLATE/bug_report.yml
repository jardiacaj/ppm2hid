name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact command(s) you ran.
      placeholder: |
        1. `python3 ppm2hid.py --monitor`
        2. …
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Transmitter / hardware
      description: RC transmitter model and any relevant hardware details.
      placeholder: "e.g. Absima CR10P, Line In on motherboard audio"

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.9"
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14+"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      placeholder: "e.g. Fedora 41, Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full terminal output
      description: Paste the complete output including any error messages.
      render: text
